<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Pro Crypto Terminal</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6; /* Electric Blue */
            --secondary: #a855f7; /* Purple Glow */
            --accent: #22d3ee;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --positive: #10b981;
            --negative: #ef4444;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
            scroll-behavior: smooth;
            /* Neon Ambient Glows */
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(168, 85, 247, 0.05) 0%, transparent 50%);
        }

        /* --- GLASS NAVIGATION --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: rgba(3, 7, 18, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-links a:hover { color: var(--primary); }

        .btn-glow {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            transition: var(--transition);
        }

        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.5);
        }

        /* --- DASHBOARD LAYOUT --- */
        main {
            padding: 100px 5% 50px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 20px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            transition: var(--transition);
            animation: fadeIn 0.8s ease-out forwards;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(17, 24, 39, 0.8);
        }

        /* Bento Grid Specifics */
        .col-span-2 { grid-column: span 2; }
        .col-span-3 { grid-column: span 3; }
        .row-span-2 { grid-row: span 2; }

        /* --- COMPONENT STYLES --- */
        .card-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .balance-amount {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .trend {
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .trend.up { color: var(--positive); }
        .trend.down { color: var(--negative); }

        /* Simulated Chart Area */
        .chart-placeholder {
            width: 100%;
            height: 200px;
            margin-top: 20px;
            background: linear-gradient(transparent 80%, rgba(59, 130, 246, 0.1));
            border-bottom: 2px solid var(--primary);
            position: relative;
            overflow: hidden;
        }

        .chart-placeholder::after {
            content: '';
            position: absolute;
            top: 40%;
            left: 0;
            width: 200%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: moveLine 4s infinite linear;
        }

        /* Market Table */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            color: var(--text-muted);
            font-size: 0.8rem;
            padding-bottom: 15px;
        }

        td {
            padding: 15px 0;
            border-top: 1px solid var(--border);
            font-size: 0.95rem;
        }

        .coin-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .coin-icon {
            width: 32px;
            height: 32px;
            background: #1f2937;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes moveLine {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 1024px) {
            main { grid-template-columns: repeat(2, 1fr); }
            .col-span-3, .col-span-2 { grid-column: span 2; }
        }

        @media (max-width: 640px) {
            main { grid-template-columns: 1fr; }
            .col-span-3, .col-span-2 { grid-column: span 1; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <i data-lucide="shield-check"></i> NEXUS
        </div>
        <div class="nav-links">
            <a href="#">Market</a>
            <a href="#">Exchange</a>
            <a href="#">Wallet</a>
            <a href="#">Nodes</a>
        </div>
        <button class="btn-glow">Connect Wallet</button>
    </nav>

    <main>
        <div class="glass-card col-span-2">
            <div class="card-title"><i data-lucide="wallet" size="16"></i> Portfolio Balance</div>
            <div class="balance-amount">$128,432.50</div>
            <div class="trend up">
                <i data-lucide="trending-up" size="14"></i> +12.4% <span style="color: var(--text-muted); font-size: 0.8rem; margin-left: 5px;">(24h)</span>
            </div>
            <div class="chart-placeholder"></div>
        </div>

        <div class="glass-card">
            <div class="card-title"><i data-lucide="repeat" size="16"></i> Quick Swap</div>
            <div style="margin-top: 10px;">
                <label style="font-size: 0.75rem; color: var(--text-muted);">From ETH</label>
                <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-top: 5px; border: 1px solid var(--border);">
                    2.45
                </div>
            </div>
            <div style="text-align: center; margin: 10px 0;">
                <i data-lucide="arrow-down" size="16" style="color: var(--primary);"></i>
            </div>
            <div>
                <label style="font-size: 0.75rem; color: var(--text-muted);">To USDT</label>
                <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-top: 5px; border: 1px solid var(--border);">
                    6,125.00
                </div>
            </div>
            <button class="btn-glow" style="width: 100%; margin-top: 20px;">Execute Swap</button>
        </div>

        <div class="glass-card">
            <div class="card-title"><i data-lucide="pie-chart" size="16"></i> Allocation</div>
            <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 10px;">
                <div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px;">
                        <span>Bitcoin</span>
                        <span>45%</span>
                    </div>
                    <div style="width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px;">
                        <div style="width: 45%; height: 100%; background: var(--primary); border-radius: 10px;"></div>
                    </div>
                </div>
                <div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px;">
                        <span>Ethereum</span>
                        <span>30%</span>
                    </div>
                    <div style="width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px;">
                        <div style="width: 30%; height: 100%; background: var(--secondary); border-radius: 10px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card col-span-3 row-span-2">
            <div class="card-title"><i data-lucide="bar-chart-3" size="16"></i> Live Market</div>
            <table>
                <thead>
                    <tr>
                        <th>Asset</th>
                        <th>Price</th>
                        <th>Change</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="market-body">
                    </tbody>
            </table>
        </div>

        <div class="glass-card">
            <div class="card-title"><i data-lucide="activity" size="16"></i> System Status</div>
            <div style="display: flex; align-items: center; gap: 10px; color: var(--positive); font-weight: 600;">
                <div style="width: 10px; height: 10px; background: var(--positive); border-radius: 50%; box-shadow: 0 0 10px var(--positive);"></div>
                Nodes Operational
            </div>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 10px;">Latency: 14ms</p>
        </div>
    </main>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Simulated Market Data
        const coins = [
            { name: 'Bitcoin', symbol: 'BTC', price: '$64,231.00', change: '+2.4%', up: true },
            { name: 'Ethereum', symbol: 'ETH', price: '$3,450.12', change: '-1.2%', up: false },
            { name: 'Solana', symbol: 'SOL', price: '$145.67', change: '+8.9%', up: true },
            { name: 'Cardano', symbol: 'ADA', price: '$0.45', change: '+0.1%', up: true }
        ];

        const marketBody = document.getElementById('market-body');

        coins.forEach(coin => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>
                    <div class="coin-info">
                        <div class="coin-icon">${coin.symbol[0]}</div>
                        <div>
                            <div style="font-weight: 600;">${coin.name}</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">${coin.symbol}</div>
                        </div>
                    </div>
                </td>
                <td>${coin.price}</td>
                <td class="${coin.up ? 'trend up' : 'trend down'}">
                    ${coin.change}
                </td>
                <td>
                    <span style="background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem;">Verified</span>
                </td>
            `;
            marketBody.appendChild(row);
        });

        // Add a bit of "life" to the dashboard numbers
        setInterval(() => {
            const balance = document.querySelector('.balance-amount');
            let current = parseFloat(balance.innerText.replace('$', '').replace(',', ''));
            current += (Math.random() - 0.5) * 10;
            balance.innerText = '$' + current.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }, 3000);
    </script>
</body>
</html>
